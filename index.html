<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CPS Tester Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #302b63, #24243e, #0f0c29);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 0 0 15px var(--accent-color);
            letter-spacing: 2px;
        }

        #timer {
            font-size: 20px;
            font-family: monospace;
            background: var(--card-bg);
            padding: 5px 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Главная кнопка-кликер */
        #click-area {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, var(--accent-color) 0%, var(--secondary-color) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.3);
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s ease;
            position: relative;
            border: 8px solid rgba(255,255,255,0.1);
        }

        #click-area:active {
            transform: scale(0.92);
            box-shadow: 0 0 50px var(--accent-color);
        }

        #stats {
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        #clicks-count {
            display: block;
            font-size: 48px;
            font-weight: 900;
            color: var(--accent-color);
        }

        #reset-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        #reset-btn:hover {
            color: white;
            border-color: white;
        }

        /* Анимация пульсации до начала теста */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 210, 255, 0.4); }
            100% { box-shadow: 0 0 0 25px rgba(0, 210, 255, 0); }
        }
    </style>
</head>
<body>

    <h1 id="title">CPS TESTER</h1>
    <div id="timer">10.00s</div>
    
    <div id="click-area" class="pulse">START</div>

    <div id="stats">
        <span id="clicks-count">0</span>
        <small id="label-clicks">CLICKS</small>
    </div>

    <button id="reset-btn">RESET</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // 1. ЛОКАЛИЗАЦИЯ
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'ru';

        const i18n = {
            'ru': { 'title': 'КЛИК ТЕСТЕР', 'area': 'ЖМИ СЮДА', 'reset': 'Сбросить', 'clicks': 'КЛИКОВ', 'time': 'сек' },
            'en': { 'title': 'CPS TESTER', 'area': 'CLICK ME', 'reset': 'Reset', 'clicks': 'CLICKS', 'time': 's' },
            'zh': { 'title': '点击测试', 'area': '点击这里', 'reset': '重置', 'clicks': '次点击', 'time': '秒' },
            'es': { 'title': 'PRUEBA CPS', 'area': 'DALE CLIC', 'reset': 'Reiniciar', 'clicks': 'CLICKS', 'time': 's' },
            'fr': { 'title': 'TEST CPS', 'area': 'CLIQUE ICI', 'reset': 'Reset', 'clicks': 'CLICS', 'time': 's' },
            'ar': { 'title': 'اختبار النقر', 'area': 'انقر هنا', 'reset': 'إعادة', 'clicks': 'نقرات', 'time': 'ثانية' }
        };

        const t = i18n[lang] || i18n['en'];

        document.getElementById('title').innerText = t.title;
        document.getElementById('click-area').innerText = t.area;
        document.getElementById('reset-btn').innerText = t.reset;
        document.getElementById('label-clicks').innerText = t.clicks;

        // 2. ЛОГИКА
        let clicks = 0;
        let timeLeft = 10.0;
        let timerId = null;
        let active = false;
        let finished = false;

        const clickArea = document.getElementById('click-area');
        const clicksDisplay = document.getElementById('clicks-count');
        const timerDisplay = document.getElementById('timer');

        // pointerdown срабатывает быстрее, чем click
        clickArea.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (finished) return;
            
            if (!active) {
                startTest();
            }
            
            clicks++;
            clicksDisplay.innerText = clicks;
            
            // Визуальный эффект при клике
            clickArea.style.filter = 'brightness(1.2)';
            setTimeout(() => clickArea.style.filter = 'brightness(1)', 50);
        });

        function startTest() {
            active = true;
            clickArea.classList.remove('pulse');
            clickArea.innerText = ""; 
            
            const startTime = Date.now();
            timerId = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timeLeft = (10 - elapsed).toFixed(2);
                
                if (timeLeft <= 0) {
                    timeLeft = "0.00";
                    endTest();
                }
                timerDisplay.innerText = timeLeft + t.time;
            }, 10);
        }

        function endTest() {
            clearInterval(timerId);
            finished = true;
            active = false;
            clickArea.innerText = "DONE!";
            
            const cps = (clicks / 10).toFixed(2);

            // Отправка данных в Telegram
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    cps: cps,
                    total_clicks: clicks,
                    lang: lang
                }));
            }, 500);
        }

        document.getElementById('reset-btn').onclick = () => {
            location.reload();
        };
    </script>
</body>
</html>
