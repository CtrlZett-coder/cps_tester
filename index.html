<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CPS Tester Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #302b63, #24243e, #0f0c29);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 0 0 15px var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #timer {
            font-size: 22px;
            font-family: monospace;
            background: var(--card-bg);
            padding: 8px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffde59;
        }

        /* Главная кнопка-кликер */
        #click-area {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, var(--accent-color) 0%, var(--secondary-color) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.3);
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 8px solid rgba(255,255,255,0.1);
            -webkit-tap-highlight-color: transparent;
        }

        #click-area:active {
            transform: scale(0.90);
            box-shadow: 0 0 60px var(--accent-color);
        }

        #stats {
            margin-top: 30px;
            padding: 15px 50px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        #clicks-count {
            display: block;
            font-size: 56px;
            font-weight: 900;
            color: var(--accent-color);
            line-height: 1;
        }

        #label-clicks {
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        #reset-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #reset-btn:active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 210, 255, 0.6); }
            100% { box-shadow: 0 0 0 30px rgba(0, 210, 255, 0); }
        }
    </style>
</head>
<body>

    <h1 id="title">CPS TESTER</h1>
    <div id="timer">10.00s</div>
    
    <div id="click-area" class="pulse">START</div>

    <div id="stats">
        <span id="clicks-count">0</span>
        <small id="label-clicks">CLICKS</small>
    </div>

    <button id="reset-btn">RESET</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // --- ЛОКАЛИЗАЦИЯ ---
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'ru';

        const i18n = {
            'ru': { 'title': 'КЛИК ТЕСТЕР', 'area': 'ЖМИ СЮДА', 'reset': 'Сбросить', 'clicks': 'КЛИКОВ', 'time': 'сек', 'done': 'ГОТОВО!' },
            'en': { 'title': 'CPS TESTER', 'area': 'CLICK ME', 'reset': 'Reset', 'clicks': 'CLICKS', 'time': 's', 'done': 'DONE!' },
            'zh': { 'title': '点击测试', 'area': '点击这里', 'reset': '重置', 'clicks': '次点击', 'time': '秒', 'done': '完成！' },
            'es': { 'title': 'PRUEBA CPS', 'area': 'DALE CLIC', 'reset': 'Reiniciar', 'clicks': 'CLICKS', 'time': 's', 'done': '¡HECHO!' },
            'fr': { 'title': 'TEST CPS', 'area': 'CLIQUE ICI', 'reset': 'Reset', 'clicks': 'CLICS', 'time': 's', 'done': 'FINI !' },
            'ar': { 'title': 'اختبار النقر', 'area': 'انقر هنا', 'reset': 'إعادة', 'clicks': 'نقرات', 'time': 'ثانية', 'done': 'تم！' }
        };

        const t = i18n[lang] || i18n['en'];

        // Применяем переводы
        document.getElementById('title').innerText = t.title;
        document.getElementById('click-area').innerText = t.area;
        document.getElementById('reset-btn').innerText = t.reset;
        document.getElementById('label-clicks').innerText = t.clicks;
        document.getElementById('timer').innerText = "10.00" + t.time;

        // --- ЛОГИКА ---
        let clicks = 0;
        let timeLeft = 10.0;
        let timerId = null;
        let active = false;
        let finished = false;

        const clickArea = document.getElementById('click-area');
        const clicksDisplay = document.getElementById('clicks-count');
        const timerDisplay = document.getElementById('timer');

        // Используем pointerdown для максимальной скорости отклика
        clickArea.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (finished) return;
            
            if (!active) {
                startTest();
            }
            
            clicks++;
            clicksDisplay.innerText = clicks;
            
            // Легкая вибрация при каждом клике (если поддерживается устройством)
            if (window.navigator.vibrate) window.navigator.vibrate(5);
        });

        function startTest() {
            active = true;
            clickArea.classList.remove('pulse');
            clickArea.innerText = ""; 
            
            const startTime = Date.now();
            timerId = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                let currentSec = (10 - elapsed).toFixed(2);
                
                if (currentSec <= 0) {
                    currentSec = "0.00";
                    endTest();
                }
                timerDisplay.innerText = currentSec + t.time;
            }, 10);
        }

        function endTest() {
            clearInterval(timerId);
            finished = true;
            active = false;
            
            // Меняем текст на кнопке на переведенный "DONE"
            clickArea.innerText = t.done;
            clickArea.style.background = "linear-gradient(circle, #00b09b 0%, #96c93d 100%)"; // Зеленый цвет финиша
            
            const cps = (clicks / 10).toFixed(2);

            // Отправка данных боту
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    cps: cps,
                    total_clicks: clicks,
                    lang: lang
                }));
            }, 600);
        }

        document.getElementById('reset-btn').onclick = () => {
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            location.reload();
        };
    </script>
</body>
</html>
