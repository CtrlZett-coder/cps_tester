<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CPS Trainer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #00ffcc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #click-area {
            width: 250px;
            height: 250px;
            border: 4px solid #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 0 20px #00ffcc;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            margin-bottom: 20px;
        }
        #click-area:active {
            transform: scale(0.95);
            background-color: rgba(0, 255, 204, 0.1);
        }
        #stats { font-size: 22px; margin-bottom: 20px; }
        .btn { 
            padding: 12px 25px; 
            background: transparent; 
            border: 2px solid #00ffcc; 
            color: #00ffcc; 
            border-radius: 8px; 
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="click-area">КЛИКАЙ ЗДЕСЬ<br>(DRAG/FLY)</div>
    <div id="stats">
        <div>CPS: <span id="cps">0</span></div>
        <div>Клики: <span id="total">0</span></div>
        <div>Время: <span id="timer">10</span>с</div>
    </div>
    <button class="btn" onclick="reset()">СБРОС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let clicks = 0;
        let startTime = null;
        let timerDuration = 10;
        let isFinished = false;

        const area = document.getElementById('click-area');
        const cpsDisplay = document.getElementById('cps');
        const totalDisplay = document.getElementById('total');
        const timerDisplay = document.getElementById('timer');

        area.addEventListener('pointerdown', (e) => {
            if (isFinished) return;
            if (!startTime) startTime = Date.now();
            
            clicks++;
            totalDisplay.innerText = clicks;
            
            let elapsed = (Date.now() - startTime) / 1000;
            if (elapsed > 0) {
                cpsDisplay.innerText = (clicks / elapsed).toFixed(2);
            }
        });

        const timerInterval = setInterval(() => {
            if (!startTime || isFinished) return;
            
            let elapsed = (Date.now() - startTime) / 1000;
            let remaining = Math.max(0, timerDuration - elapsed);
            timerDisplay.innerText = remaining.toFixed(1);

            if (remaining <= 0) {
                isFinished = true;
                const finalCps = (clicks / timerDuration).toFixed(2);
                
                // Отправляем данные. Ключи: cps и total_clicks
                tg.sendData(JSON.stringify({
                    cps: finalCps, 
                    total_clicks: clicks
                }));
                
                // Небольшая задержка перед закрытием для стабильности отправки
                setTimeout(() => { tg.close(); }, 200);
            }
        }, 100);

        function reset() {
            clicks = 0;
            startTime = null;
            isFinished = false;
            cpsDisplay.innerText = "0";
            totalDisplay.innerText = "0";
            timerDisplay.innerText = timerDuration;
        }
    </script>
</body>
</html>
