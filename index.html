<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CPS Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- БАЗОВЫЕ СТИЛИ --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: all 0.5s ease;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .style-switcher {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 100;
            padding: 0 10px;
        }

        .style-switcher button {
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .style-switcher button.active {
            background: #fff;
            color: #000;
            font-weight: bold;
        }

        #click-area {
            width: 220px;
            height: 220px;
            border: 5px solid currentColor;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            transition: transform 0.05s ease-out, all 0.3s ease;
            margin-bottom: 20px;
            cursor: pointer;
            z-index: 10;
        }

        #click-area:active { transform: scale(0.92); }

        #stats {
            text-align: center;
            font-size: 20px;
            line-height: 1.5;
            font-variant-numeric: tabular-nums;
            z-index: 10;
            padding: 10px;
            border-radius: 15px;
        }

        .btn-reset {
            margin-top: 25px;
            padding: 10px 40px;
            background: transparent;
            border: 2px solid currentColor;
            color: inherit;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }

        /* --- ТЕМЫ --- */
        body.neon-style { background: #1a1a2e; color: #00ffcc; }
        .neon-style #click-area { box-shadow: 0 0 20px #00ffcc; }

        body.yellow-style { background: #ffeb3b; color: #2e7d32; }
        .yellow-style #click-area { background: white; }

        body.space-style { 
            background: #000; 
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 100px 100px;
            color: #fff; 
        }

        body.mice-style { background: #f5f5f5; color: #5d4037; }

        /* ОБНОВЛЕННАЯ ТЕМА MEMES С ТВОИМ ФОНОМ */
        body.memes-style {
            background-image: url('https://www.tiktok.com/api/img/?itemId=7585654561713491255&location=0&aid=1988');
            background-size: cover;
            background-position: center;
            color: #fff;
        }
        .memes-style #click-area { 
            background: rgba(0, 0, 0, 0.4); 
            border-color: #fff; 
            backdrop-filter: blur(4px);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }
        .memes-style #stats {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="neon-style">

    <div class="style-switcher">
        <button onclick="changeStyle('neon', this)" class="active">Neon</button>
        <button onclick="changeStyle('yellow', this)">Yellow</button>
        <button onclick="changeStyle('space', this)">Space</button>
        <button onclick="changeStyle('mice', this)">Mice</button>
        <button onclick="changeStyle('memes', this)">Memes</button>
    </div>

    <div id="click-area">КЛИКАЙ!</div>

    <div id="stats">
        CPS: <span id="cps">0.00</span><br>
        КЛИКИ: <span id="total">0</span><br>
        ВРЕМЯ: <span id="timer">10.0</span>с
    </div>

    <button class="btn-reset" onclick="location.reload()">СБРОС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let clicks = 0;
        let startTime = null;
        let isFinished = false;

        const area = document.getElementById('click-area');
        const cpsDisp = document.getElementById('cps');
        const totDisp = document.getElementById('total');
        const timDisp = document.getElementById('timer');

        function changeStyle(theme, btn) {
            document.body.className = theme + '-style';
            document.querySelectorAll('.style-switcher button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        area.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (isFinished) return;
            if (!startTime) {
                startTime = performance.now();
                requestAnimationFrame(update);
            }
            clicks++;
            totDisp.textContent = clicks;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        function update() {
            if (isFinished) return;
            const now = performance.now();
            const elapsed = now - startTime;
            const remaining = Math.max(0, (10000 - elapsed) / 1000);

            timDisp.textContent = remaining.toFixed(1);
            cpsDisp.textContent = (clicks / (Math.max(100, elapsed) / 1000)).toFixed(2);

            if (elapsed >= 10000) {
                isFinished = true;
                area.textContent = "КОНЕЦ";
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.sendData(JSON.stringify({cps: cpsDisp.textContent, total: clicks}));
            } else {
                requestAnimationFrame(update);
            }
        }
    </script>
</body>
</html>
