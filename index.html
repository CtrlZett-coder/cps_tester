<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CPS Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #00ffcc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #click-area {
            width: 220px;
            height: 220px;
            border: 5px solid #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 0 15px #00ffcc;
            will-change: transform; /* Оптимизация для GPU */
            transition: transform 0.05s ease-out;
        }
        #click-area:active { transform: scale(0.92); }
        #stats { font-size: 24px; margin-top: 20px; font-variant-numeric: tabular-nums; }
        .btn { margin-top: 20px; padding: 10px 30px; background: #222; border: 1px solid #00ffcc; color: #00ffcc; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="click-area">КЛИКАЙ!</div>
    <div id="stats">
        CPS: <span id="cps">0.00</span><br>
        КЛИКИ: <span id="total">0</span><br>
        ВРЕМЯ: <span id="timer">10.0</span>с
    </div>
    <button class="btn" onclick="location.reload()">СБРОС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let clicks = 0;
        let startTime = null;
        let isFinished = false;
        const duration = 10000; // 10 сек в мс

        const area = document.getElementById('click-area');
        const cpsDisp = document.getElementById('cps');
        const totDisp = document.getElementById('total');
        const timDisp = document.getElementById('timer');

        // Супер-легкий обработчик
        area.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (isFinished) return;
            if (!startTime) startTime = performance.now();
            clicks++;
        }, { passive: false });

        // Плавный цикл отрисовки (60+ FPS)
        function update() {
            if (!startTime || isFinished) {
                if (!isFinished) requestAnimationFrame(update);
                return;
            }

            const now = performance.now();
            const elapsed = now - startTime;
            const remaining = Math.max(0, (duration - elapsed) / 1000);

            // Обновляем текст
            timDisp.textContent = remaining.toFixed(1);
            totDisp.textContent = clicks;
            cpsDisp.textContent = (clicks / (elapsed / 1000)).toFixed(2);

            if (elapsed >= duration) {
                finish();
            } else {
                requestAnimationFrame(update);
            }
        }

        function finish() {
            isFinished = true;
            area.style.borderColor = "#ff0055";
            area.textContent = "КОНЕЦ";
            
            tg.sendData(JSON.stringify({
                cps: (clicks / 10).toFixed(2),
                total_clicks: clicks
            }));
            
            setTimeout(() => tg.close(), 1000);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
