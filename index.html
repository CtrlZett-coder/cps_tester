<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CPS Trainer AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #00ffcc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #click-area {
            width: 250px;
            height: 250px;
            border: 4px solid #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 0 20px #00ffcc;
            cursor: pointer;
            transition: transform 0.05s;
            margin-bottom: 20px;
        }
        #click-area:active {
            transform: scale(0.95);
            background-color: rgba(0, 255, 204, 0.1);
        }
        #stats { font-size: 22px; margin-bottom: 20px; text-align: center; }
        .btn { 
            padding: 12px 25px; 
            background: transparent; 
            border: 2px solid #00ffcc; 
            color: #00ffcc; 
            border-radius: 8px; 
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="click-area">КЛИКАЙ ЗДЕСЬ<br>(DRAG/FLY)</div>
    <div id="stats">
        <div>CPS: <span id="cps">0</span></div>
        <div>Клики: <span id="total">0</span></div>
        <div>Время: <span id="timer">10</span>с</div>
    </div>
    <button class="btn" onclick="reset()">СБРОС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.disableVerticalSwipe();

        let clicks = 0;
        let startTime = null;
        let timerDuration = 10;
        let isFinished = false;

        const area = document.getElementById('click-area');
        const cpsDisplay = document.getElementById('cps');
        const totalDisplay = document.getElementById('total');
        const timerDisplay = document.getElementById('timer');

        // Обработка клика (максимально легкая)
        area.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (isFinished) return;
            if (!startTime) startTime = Date.now();
            clicks++;
        });

        // Таймер и обновление экрана (раз в 100мс)
        const timerInterval = setInterval(() => {
            if (!startTime || isFinished) return;
            
            let elapsed = (Date.now() - startTime) / 1000;
            let remaining = Math.max(0, timerDuration - elapsed);
            
            // Обновляем текст в HTML тут, чтобы не тормозило при кликах
            timerDisplay.innerText = remaining.toFixed(1);
            totalDisplay.innerText = clicks;
            if (elapsed > 0) {
                cpsDisplay.innerText = (clicks / elapsed).toFixed(2);
            }

            if (remaining <= 0) finishTest();
        }, 100);

        function finishTest() {
            if (isFinished) return;
            isFinished = true;
            clearInterval(timerInterval);

            area.style.opacity = "0.5";
            area.style.borderColor = "#ff0066";
            area.style.boxShadow = "0 0 20px #ff0066";
            area.innerText = "ОБРАБОТКА...";
            
            const resultData = JSON.stringify({
                cps: (clicks / timerDuration).toFixed(2), 
                total_clicks: clicks
            });

            tg.sendData(resultData);
            setTimeout(() => { tg.close(); }, 800);
        }

        function reset() { location.reload(); }
    </script>
</body>
</html>
