<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CPS Tester Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #0088cc;
            --bg-color: #1c1c1c;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation; /* Убирает задержку клика на мобилках */
        }

        #title {
            margin-bottom: 10px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #timer {
            font-size: 18px;
            margin-bottom: 20px;
            color: #aaa;
        }

        #click-area {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #333 0%, #222 100%);
            border: 4px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.3);
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s active;
        }

        #click-area:active {
            transform: scale(0.95);
            background: radial-gradient(circle, #444 0%, #333 100%);
        }

        #stats {
            margin-top: 20px;
            font-size: 20px;
        }

        #reset-btn {
            margin-top: 30px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid #555;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1 id="title">CPS TESTER</h1>
    <div id="timer">00:10</div>
    
    <div id="click-area">CLICK ME</div>

    <div id="stats">
        <span id="clicks-count">0</span> CLICKS
    </div>

    <button id="reset-btn">RESET</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПЕРЕВОДЫ
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'ru';

        const i18n = {
            'ru': { 'title': 'КЛИК ТЕСТЕР', 'area': 'ЖМИ СЮДА', 'reset': 'Сбросить', 'clicks': 'КЛИКОВ', 'timer': 'Осталось: ' },
            'en': { 'title': 'CPS TESTER', 'area': 'CLICK HERE', 'reset': 'Reset', 'clicks': 'CLICKS', 'timer': 'Time left: ' },
            'zh': { 'title': '点击测试', 'area': '点击这里', 'reset': '重置', 'clicks': '次点击', 'timer': '剩余时间: ' },
            'es': { 'title': 'PRUEBA CPS', 'area': 'CLIC AQUÍ', 'reset': 'Reiniciar', 'clicks': 'CLICKS', 'timer': 'Tiempo: ' },
            'fr': { 'title': 'TEST CPS', 'area': 'CLIQUEZ ICI', 'reset': 'Reset', 'clicks': 'CLICS', 'timer': 'Temps: ' },
            'ar': { 'title': 'اختبار النقر', 'area': 'انقر هنا', 'reset': 'إعادة', 'clicks': 'نقرات', 'timer': 'الوقت: ' }
        };

        const t = i18n[lang] || i18n['en'];

        // Применяем переводы
        document.getElementById('title').innerText = t.title;
        document.getElementById('click-area').innerText = t.area;
        document.getElementById('reset-btn').innerText = t.reset;
        document.querySelector('#stats').innerHTML = `<span id="clicks-count">0</span> ${t.clicks}`;

        // 2. ЛОГИКА ТЕСТА
        let clicks = 0;
        let timeLeft = 10;
        let timerId = null;
        let active = false;
        let finished = false;

        const clickArea = document.getElementById('click-area');
        const clicksDisplay = document.getElementById('clicks-count');
        const timerDisplay = document.getElementById('timer');

        // Используем pointerdown для максимальной скорости реакции
        clickArea.addEventListener('pointerdown', (e) => {
            if (finished) return;
            
            if (!active) {
                startTest();
            }
            
            clicks++;
            clicksDisplay.innerText = clicks;
        });

        function startTest() {
            active = true;
            clickArea.innerText = ""; // Убираем текст после начала
            timerId = setInterval(() => {
                timeLeft -= 1;
                timerDisplay.innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;
                
                if (timeLeft <= 0) {
                    endTest();
                }
            }, 1000);
        }

        function endTest() {
            clearInterval(timerId);
            finished = true;
            active = false;
            
            const cps = (clicks / 10).toFixed(2);

            // Отправка данных боту
            tg.sendData(JSON.stringify({
                cps: cps,
                total_clicks: clicks,
                lang: lang
            }));
        }

        document.getElementById('reset-btn').onclick = () => {
            location.reload();
        };
    </script>
</body>
</html>
